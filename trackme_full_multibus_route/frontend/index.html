<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrackMe Live Tracking</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
  .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
</style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex flex-col pt-8 pb-4 px-4 sm:px-8">

<div class="max-w-6xl w-full mx-auto flex flex-col flex-grow relative">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
      <i class="fa-solid fa-map-location-dot mr-3 text-blue-400"></i>TrackMe
    </h1>
    <div class="text-slate-400 text-sm font-medium tracking-wide items-center hidden sm:flex">
      <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span> System Online
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="glass-panel p-6 rounded-2xl mb-6 shadow-2xl flex flex-col md:flex-row gap-6 relative z-10">
    <div class="flex-1">
      <label class="block text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wide">Live Tracking</label>
      <div class="flex">
        <div class="relative flex-grow">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
            <i class="fa-solid fa-bus"></i>
          </div>
          <input id="busNumberInput" class="w-full bg-slate-800 border-slate-700 text-white rounded-l-xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border transition-all placeholder-slate-500" placeholder="Enter Bus ID (e.g. MH-42)">
        </div>
        <button id="trackBusBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-6 py-3 rounded-r-xl transition-all shadow-lg hover:shadow-blue-500/30 flex items-center">
          Track <i class="fa-solid fa-crosshairs ml-2"></i>
        </button>
      </div>
    </div>

    <div class="w-px bg-slate-700 hidden md:block"></div>

    <div class="flex-1">
      <label class="block text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wide">Route Visualization</label>
      <div class="flex">
        <div class="relative flex-grow">
          <select id="routeSelector" class="w-full bg-slate-800 border-slate-700 text-white rounded-l-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 border transition-all appearance-none cursor-pointer">
            <option value="" disabled selected>Select a mapped route</option>
            <option value="route18">Route 18 (City Core)</option>
            <option value="route44">Route 44 (Expressway)</option>
          </select>
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-chevron-down text-sm"></i>
          </div>
        </div>
        <button id="showRouteBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-6 py-3 rounded-r-xl transition-all shadow-lg hover:shadow-emerald-500/30 flex items-center">
          Show <i class="fa-solid fa-route ml-2"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Map Area -->
  <div class="relative flex-grow glass-panel p-2 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.5)]">
    <div id="live-map" class="w-full h-[600px] rounded-2xl z-0"></div>
  </div>
</div>

<script>
const map = L.map('live-map').setView([17.3850, 78.4867], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let busMarkers = {};
let routePolyline = null;

const socket = io();

socket.on("busLocationUpdate", allBuses=>{
  Object.keys(allBuses).forEach(busId=>{
    const bus = allBuses[busId];

    if(!busMarkers[busId]){
      // Create a red bus-like marker
      const busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
        iconSize: [40, 40], // size of the icon
        iconAnchor: [20, 20], // point of the icon which will correspond to marker's location
      });
      busMarkers[busId] = L.marker([bus.lat, bus.lng], {icon: busIcon}).addTo(map)
        .bindPopup(`Bus ID: ${busId}`).openPopup();
    } else {
      busMarkers[busId].setLatLng([bus.lat, bus.lng]);
    }
  });

  // intentionally NOT fitting bounds here so it doesn't violently snap the camera every 2 seconds while trying to view the route!
});

document.getElementById("trackBusBtn").onclick = async()=>{
  const busNumber = document.getElementById("busNumberInput").value;
  if(!busNumber) return Swal.fire({icon: 'warning', title: 'Oops...', text: 'Enter a bus ID', background: '#1e293b', color: '#f8fafc'});
  const res = await fetch(`/api/findBus?busNumber=${busNumber}`);
  const json = await res.json();
  if(!json.found) return Swal.fire({icon: 'error', title: 'Not Found', text: 'Bus not found or not live', background: '#1e293b', color: '#f8fafc'});
  Swal.fire({icon: 'success', title: 'Tracking Started', text: `Now tracking bus: ${busNumber}`, background: '#1e293b', color: '#f8fafc', timer: 2000, showConfirmButton: false});
};

document.getElementById("showRouteBtn").onclick = ()=>{
  const route = document.getElementById("routeSelector").value;
  if(!route) return Swal.fire({icon: 'warning', title: 'Select Route', text: 'Please select a route from the dropdown.', background: '#1e293b', color: '#f8fafc'});
  socket.emit("getRoute", route);
};

let routeMarkers = [];

socket.on("routeData", async data=>{
  if(routePolyline) map.removeLayer(routePolyline);
  routeMarkers.forEach(m => map.removeLayer(m));
  routeMarkers = [];

  // Use OSRM to get a realistic road route matching the screenshot
  const coordsStr = data.map(p => `${p[1]},${p[0]}`).join(';');
  let finalCoords = data;

  try {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsStr}?geometries=geojson`);
    const json = await res.json();
    if(json.routes && json.routes[0]) {
      finalCoords = json.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    }
  } catch(e) {
    console.error("OSRM failed, using straight lines");
  }

  routePolyline = L.polyline(finalCoords, {
    color: "#0066cc",
    weight: 6,
    opacity: 0.8,
    lineJoin: 'round'
  }).addTo(map);

  // Add markers for start and end point like the screenshot
  if(data.length > 0) {
    routeMarkers.push(L.marker(data[0]).addTo(map));
    routeMarkers.push(L.marker(data[data.length-1]).addTo(map));
  }

  map.fitBounds(routePolyline.getBounds());
});
</script>

</body>
</html>
